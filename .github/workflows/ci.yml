name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://postgres:postgres@localhost/soroban_pulse_test

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  check-migrations:
    name: Check Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-migrations.sh

  validate-sdk:
    name: Validate SDKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - run: make generate-sdk
      - name: Check for diffs
        run: |
          if [ -n "$(git status --porcelain sdk/)" ]; then
            echo "SDKs are out of date. Please run 'make generate-sdk' and commit the changes."
            git status --porcelain sdk/
            exit 1
          fi

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      - run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soroban_pulse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      - uses: actions/cache@v4
        with:
          path: .sqlx
          key: ${{ runner.os }}-sqlx-${{ hashFiles('.sqlx/**') }}
          restore-keys: ${{ runner.os }}-sqlx-
      - run: sudo apt-get install -y libpq-dev pkg-config libssl-dev
      - run: cargo test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soroban_pulse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      - uses: actions/cache@v4
        with:
          path: .sqlx
          key: ${{ runner.os }}-sqlx-${{ hashFiles('.sqlx/**') }}
          restore-keys: ${{ runner.os }}-sqlx-
      - run: sudo apt-get install -y libpq-dev pkg-config libssl-dev
      - run: cargo test --test integration_tests

  resilience-tests:
    name: Resilience Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soroban_pulse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      - uses: actions/cache@v4
        with:
          path: .sqlx
          key: ${{ runner.os }}-sqlx-${{ hashFiles('.sqlx/**') }}
          restore-keys: ${{ runner.os }}-sqlx-
      - run: sudo apt-get install -y libpq-dev pkg-config libssl-dev
      - run: cargo test --test resilience

  bench:
    name: Bench (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      - run: cargo bench

  fuzz:
    name: Fuzz (60s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      - run: cargo install cargo-fuzz
      - run: cargo fuzz run fuzz_validate_contract_id -- -max_total_time=60
        working-directory: fuzz
      - run: cargo fuzz run fuzz_validate_tx_hash -- -max_total_time=60
        working-directory: fuzz
      - run: cargo fuzz run fuzz_pagination_params -- -max_total_time=60
        working-directory: fuzz
      - name: Upload fuzz corpus artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus
          path: fuzz/corpus/
          retention-days: 30

  build:
    name: Release Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      - run: sudo apt-get install -y pkg-config libssl-dev
      - run: cargo build --release

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [fmt, check-migrations, clippy, test, integration-tests, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: "3.14.0"
      - name: Lint Helm chart
        run: helm lint helm/soroban-pulse
      - name: Render template (default values)
        run: helm template soroban-pulse helm/soroban-pulse | grep -v "DATABASE_URL\|API_KEY\|SMTP_PASSWORD"
      - name: Render template (existingSecret)
        run: helm template soroban-pulse helm/soroban-pulse --set existingSecret=my-secret

  openapi:
    name: OpenAPI Spec Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      - run: sudo apt-get install -y pkg-config libssl-dev
      - name: Generate OpenAPI spec
        run: cargo run --bin gen_openapi > /tmp/openapi-generated.json
      - name: Check openapi.json is up to date
        run: |
          if ! diff -q openapi.json /tmp/openapi-generated.json > /dev/null 2>&1; then
            echo "OpenAPI spec is out of date — run make gen-openapi and commit the result"
            diff openapi.json /tmp/openapi-generated.json
            exit 1
          fi
      - name: Copy spec to docs for Swagger UI
        run: cp openapi.json docs/openapi.json
      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli@6.11.1
      - name: Validate OpenAPI spec
        run: spectral lint openapi.json --ruleset https://unpkg.com/@stoplight/spectral-openapi/dist/ruleset.js
